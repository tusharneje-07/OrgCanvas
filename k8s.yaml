apiVersion: apps/v1
kind: Deployment
metadata:
  name: orgcanvas-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orgcanvas
  template:
    metadata:
      labels:
        app: orgcanvas
    spec:
      containers:
        - name: orgcanvas-container
          image: nejetushar/orgcanvas:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: orgcanvas-service
spec:
  type: NodePort
  selector:
    app: orgcanvas
  ports:
    - port: 80
      targetPort: 5000
      nodePort: 30007
